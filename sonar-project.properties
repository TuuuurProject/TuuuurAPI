# ==============================
# SonarQube project configuration
# ==============================

# Unique key of the project in SonarQube
sonar.projectKey=TuuuurProject_TuuuurAPI

# Name of the project
sonar.projectName=TuuuurProject API

# Organization (if using SonarCloud)
sonar.organization=tuuuurproject

# Source directories to analyze
sonar.sources=.

# Test directories (optional)
sonar.tests=tests

# Path to coverage reports
sonar.cs.opencover.reportsPaths=coverage/*.xml

# ==============================
# Exclusions
# ==============================

# Exclude specific SQL post-deploy file and generated Python scripts
sonar.exclusions=src/Tuuuur.Database/PostDeploy_Questions.sql,

# Additional general exclusions (optional)
# sonar.exclusions=**/node_modules/**,**/*.min.js