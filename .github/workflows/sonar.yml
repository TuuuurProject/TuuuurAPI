name: sonar

on:
  workflow_call:
    inputs:
      projectKey:
        required: true
        type: string
    secrets:
      sonarToken:
        required: true
      sonarHost:
        required: true

jobs:
  sonar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarQube analysis
        run: |
          echo "=== DEBUG: Lancement de sonarscanner begin ==="
          dotnet sonarscanner begin `
            /k:"${{ inputs.projectKey }}" `
            /d:sonar.host.url="${{ secrets.sonarHost }}" `
            /d:sonar.token="${{ secrets.sonarToken }}" `
            /d:sonar.cs.cobertura.reportsPaths="TestResults/**/*.cobertura.xml"
          echo "=== DEBUG: Fin de sonarscanner begin ==="

      - name: Restore NuGet packages
        run: |
          echo "=== DEBUG: dotnet restore ==="
          dotnet restore
          echo "=== DEBUG: Fin dotnet restore ==="

      - name: Build for Sonar
        run: |
          echo "=== DEBUG: dotnet build ==="
          dotnet build --configuration Release --no-restore
          echo "=== DEBUG: Fin dotnet build ==="

      - name: Run unit tests with coverage
        run: |
          # Crée le dossier central pour les résultats
          if (-Not (Test-Path "./TestResults")) { New-Item -ItemType Directory -Path "./TestResults" }

          # Parcourt tous les projets *.Tests.csproj et lance les tests
          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
            $projectName = $_.BaseName
            $outputPath = Join-Path -Path "./TestResults" -ChildPath $projectName
            if (-Not (Test-Path $outputPath)) { New-Item -ItemType Directory -Path $outputPath }

            dotnet test $_.FullName `
              --configuration Release `
              --verbosity normal `
              --collect:"XPlat Code Coverage" `
              --results-directory TestResults `
              /p:CoverletOutput="$outputPath/coverage.xml"
          }

      - name: List TestResults folder
        run: |
          echo "=== DEBUG: Contenu du dossier TestResults ==="
          Get-ChildItem -Path TestResults -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Check coverage files exist
        run: |
          echo "=== DEBUG: Recherche des fichiers .cobertura.xml ==="
          $files = Get-ChildItem -Path TestResults -Recurse -Filter *.cobertura.xml
          if ($files.Count -eq 0) {
            Write-Warning "Aucun fichier cobertura trouvé !"
          } else {
            Write-Host "$($files.Count) fichiers cobertura trouvés :"
            $files | ForEach-Object { Write-Host $_.FullName }
          }

      - name: End SonarQube analysis
        run: |
          echo "=== DEBUG: Lancement de sonarscanner end ==="
          dotnet sonarscanner end /d:sonar.token="${{ secrets.sonarToken }}"
          echo "=== DEBUG: Fin de sonarscanner end ==="
