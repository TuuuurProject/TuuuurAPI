name: sonar

on:
  workflow_call:
    inputs:
      projectKey:
        required: true
        type: string
      branchName:
        required: true
        type: string
    secrets:
      sonarToken:
        required: true
      sonarHost:
        required: true

jobs:
  sonar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner & Coverlet
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global coverlet.console

      - name: Begin SonarQube analysis
        run: |
          echo "=== DEBUG: Lancement de sonarscanner begin ==="
          dotnet sonarscanner begin `
            /k:"${{ inputs.projectKey }}" `
            /d:sonar.host.url="${{ secrets.sonarHost }}" `
            /d:sonar.token="${{ secrets.sonarToken }}" `
            /d:sonar.branch.name="${{ inputs.branchName }}" `
            /d:sonar.cs.opencover.reportsPaths="tests/**/TestResults/**/coverage.opencover.xml"
          echo "=== DEBUG: Fin de sonarscanner begin ==="

      - name: Restore NuGet packages
        run: |
          echo "=== DEBUG: dotnet restore ==="
          dotnet restore
          echo "=== DEBUG: Fin dotnet restore ==="

      - name: Build for Sonar
        run: |
          echo "=== DEBUG: dotnet build ==="
          dotnet build --configuration Debug --no-restore
          echo "=== DEBUG: Fin dotnet build ==="

      - name: Run unit tests with coverage
        run: |
          echo "=== DEBUG: Lancement des tests avec coverage ==="

          # Parcourt tous les projets *.Tests.csproj et lance les tests avec coverlet.console
          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
              $projectName = $_.BaseName
              $projectDir = $_.DirectoryName
              $outputPath = Join-Path $projectDir "TestResults"
              if (-Not (Test-Path $outputPath)) { New-Item -ItemType Directory -Path $outputPath }

              $dllPath = Join-Path $projectDir "bin\Debug\net8.0\$projectName.dll"

              echo "=== DEBUG: Test du projet $projectName ==="
              dotnet test $_.FullName `
                --configuration Debug `
                --no-restore `
                --no-build `
                --settings test.runsettings `
                --collect:"XPlat Code Coverage" `
                /nologo `
                /p:CollectCoverage=true `
                /p:CoverletOutputFormat=opencover `
                /p:CoverletOutput="$outputPath/coverage.opencover.xml"
          }

      - name: List all coverage files
        run: |
          echo "=== DEBUG: Liste de tous les fichiers coverage.opencover.xml ==="
          $files = Get-ChildItem -Path tests -Recurse -Filter *.opencover.xml
          if ($files.Count -eq 0) {
            Write-Warning "Aucun fichier opencover trouvé !"
          } else {
            Write-Host "$($files.Count) fichiers opencover trouvés :"
            $files | ForEach-Object { Write-Host $_.FullName }
          }

      - name: End SonarQube analysis
        run: |
          echo "=== DEBUG: Lancement de sonarscanner end ==="
          dotnet sonarscanner end /d:sonar.token="${{ secrets.sonarToken }}"
          echo "=== DEBUG: Fin de sonarscanner end ==="
