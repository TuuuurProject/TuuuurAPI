name: SonarQube

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, Test and Analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console

      - name: Read sonar-exclusions.txt
        id: exclusions
        shell: powershell
        run: |
          if (-Not (Test-Path "sonar-exclusions.txt")) {
              echo "exclusions=" >> $GITHUB_OUTPUT
          } else {
              $lines = Get-Content "sonar-exclusions.txt" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
              $exclusions = $lines -join ","
              echo "exclusions=$exclusions" >> $GITHUB_OUTPUT
          }

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          echo "=== DEBUG: Begin SonarQube analysis ==="
          if (-Not (Test-Path "coverage")) { New-Item -ItemType Directory -Path "coverage" -Force }
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"TuuuurProject_TuuuurAPI" `
            /o:"tuuuurproject" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.cs.opencover.reportsPaths="coverage/*.xml" `
            /d:sonar.exclusions="${{ steps.exclusions.outputs.exclusions }}"
          echo "=== DEBUG: End Begin step ==="

      - name: Restore NuGet packages
        shell: powershell
        run: dotnet restore

      - name: Build project
        shell: powershell
        run: dotnet build --configuration Debug --no-restore

      - name: Run unit tests with coverage
        shell: powershell
        run: |
          echo "=== DEBUG: Run tests with coverage ==="
          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
              $projectName = $_.BaseName
              $projectDir = $_.DirectoryName
              $outputPath = Join-Path $projectDir "TestResults"
              if (-Not (Test-Path $outputPath)) { New-Item -ItemType Directory -Path $outputPath -Force }

              dotnet test $_.FullName `
                --configuration Debug `
                --no-restore `
                --no-build `
                --settings test.runsettings `
                --collect:"XPlat Code Coverage" `
                /nologo `
                /p:CollectCoverage=true `
                /p:CoverletOutputFormat=opencover `
                /p:CoverletOutput="$outputPath/coverage.opencover.xml"

              # Copier tous les fichiers coverage dans le dossier commun
              Get-ChildItem -Path $outputPath -Recurse -Filter coverage.opencover.xml | ForEach-Object {
                  Copy-Item $_.FullName -Destination "coverage/$projectName.xml" -Force
              }
          }

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          echo "=== DEBUG: End SonarQube analysis ==="
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
          echo "=== DEBUG: Finished ==="
