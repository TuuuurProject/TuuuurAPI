name: coverage

on:
  workflow_call:
    inputs:
      branchName:
        required: true
        type: string

jobs:
  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install tools
        run: |
          dotnet tool install --global coverlet.console
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Debug --no-restore

      - name: Run unit tests with coverage
        run: |
          echo "=== DEBUG: Lancement des tests avec coverage ==="

          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
              $projectName = $_.BaseName
              $projectDir = $_.DirectoryName
              $outputPath = Join-Path $projectDir "TestResults"
              if (-Not (Test-Path $outputPath)) { New-Item -ItemType Directory -Path $outputPath }

              echo "=== DEBUG: Test du projet $projectName ==="
              dotnet test $_.FullName `
                --configuration Debug `
                --no-restore `
                --no-build `
                --settings test.runsettings `
                --collect:"XPlat Code Coverage" `
                /nologo `
                /p:CollectCoverage=true `
                /p:CoverletOutputFormat=opencover `
                /p:CoverletOutput="$outputPath/coverage.opencover.xml"
          }

      - name: Generate coverage report
        run: |
            reportgenerator `
            -reports:tests/**/TestResults/**/coverage.opencover.xml `
            -targetdir:coverage-report `
            -reporttypes:"HtmlInline_AzurePipelines;Cobertura"

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Add coverage summary
        run: |
          $cobertura = Get-Content coverage-report\Cobertura.xml
          $coverage = Select-String -Path coverage-report\Cobertura.xml -Pattern 'line-rate="([0-9.]+)"' | ForEach-Object {
              [math]::Round([double]($_.Matches.Groups[1].Value) * 100, 2)
          }
          echo "### Code Coverage: $coverage% " >> $env:GITHUB_STEP_SUMMARY
