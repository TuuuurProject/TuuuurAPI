name: sonar

on:
  workflow_call:
    inputs:
      projectKey:
        required: true
        type: string
    secrets:
      sonarToken:
        required: true
      sonarHost:
        required: true

jobs:
  sonar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarQube analysis
        shell: pwsh
        run: |
          echo "=== DEBUG: Lancement de SonarScanner begin ==="
          dotnet sonarscanner begin `
            /k:"${{ inputs.projectKey }}" `
            /d:sonar.host.url="${{ secrets.sonarHost }}" `
            /d:sonar.token="${{ secrets.sonarToken }}" `
            /d:sonar.cs.opencover.reportsPaths="tests/**/TestResults/**/*.cobertura.xml"
          echo "=== DEBUG: Fin de SonarScanner begin ==="

      - name: Restore NuGet packages
        run: |
          echo "=== DEBUG: dotnet restore ==="
          dotnet restore
          echo "=== DEBUG: Fin dotnet restore ==="

      - name: Build for Sonar
        run: |
          echo "=== DEBUG: dotnet build ==="
          dotnet build --configuration Release --no-restore
          echo "=== DEBUG: Fin dotnet build ==="

      - name: Run unit tests with coverage
        shell: pwsh
        run: |
          echo "=== DEBUG: Lancement des tests avec coverage ==="

          $coverageFiles = @()
          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
            $project = $_.FullName
            $outputDir = Join-Path $_.DirectoryName "TestResults"
            if (-Not (Test-Path $outputDir)) { New-Item -ItemType Directory -Path $outputDir }
            
            $coverageFile = Join-Path $outputDir "$($_.BaseName).cobertura.xml"
            echo "=== DEBUG: Test du projet $($_.BaseName), coverage => $coverageFile ==="
            
            dotnet test $project `
              --configuration Release `
              /p:CollectCoverage=true `
              /p:CoverletOutput=$coverageFile `
              /p:CoverletOutputFormat=cobertura

            $coverageFiles += $coverageFile
          }

          echo "=== DEBUG: Coverage générée ==="
          $coverageFiles | ForEach-Object { Write-Host $_ }

      - name: End SonarQube analysis
        shell: pwsh
        run: |
          echo "=== DEBUG: Lancement de SonarScanner end ==="
          dotnet sonarscanner end /d:sonar.login="${{ secrets.sonarToken }}"
          echo "=== DEBUG: Fin de SonarScanner end ==="
