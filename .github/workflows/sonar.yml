name: SonarQube

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, Test and Analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for accurate blame and coverage

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.414

      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          echo "=== DEBUG: Begin SonarQube analysis ==="
          if (-Not (Test-Path "coverage")) { New-Item -ItemType Directory -Path "coverage" }
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"TuuuurProject_TuuuurAPI" `
            /o:"tuuuurproject" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.opencover.reportsPaths="coverage/*.xml"
          echo "=== DEBUG: End Begin step ==="

      - name: Restore NuGet packages
        shell: powershell
        run: |
          dotnet restore

      - name: Build project
        shell: powershell
        run: |
          dotnet build --configuration Debug --no-restore

      - name: Run unit tests with coverage
        shell: powershell
        run: |
          echo "=== DEBUG: Run tests with coverage ==="
          Get-ChildItem -Path tests -Recurse -Filter *.Tests.csproj | ForEach-Object {
              $projectName = $_.BaseName
              $projectDir = $_.DirectoryName
              $outputPath = Join-Path $projectDir "TestResults"
              if (-Not (Test-Path $outputPath)) { New-Item -ItemType Directory -Path $outputPath }

              dotnet test $_.FullName `
                --configuration Debug `
                --no-restore `
                --no-build `
                --settings test.runsettings `
                --collect:"XPlat Code Coverage" `
                /nologo `
                /p:CollectCoverage=true `
                /p:CoverletOutputFormat=opencover `
                /p:CoverletOutput="$outputPath/coverage.opencover.xml"

              # Copier tous les fichiers coverage dans le dossier commun
              Get-ChildItem -Path $outputPath -Recurse -Filter coverage.opencover.xml | ForEach-Object {
                  Copy-Item $_.FullName -Destination "coverage/$projectName.xml" -Force
              }
          }

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          echo "=== DEBUG: End SonarQube analysis ==="
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          echo "=== DEBUG: Finished ==="