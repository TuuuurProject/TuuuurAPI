name: CD - Release (Preprod)

on:
  push:
    branches:
      - release

jobs:
  docker-push:
    uses: ./.github/workflows/cd-docker-push.yml
    with:
      environment_name: "Preprod"
      docker_tags: "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:preprod,${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:preprod-${{ github.sha }}"
    secrets:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
