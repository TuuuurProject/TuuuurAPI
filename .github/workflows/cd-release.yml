name: CD - Release

on:
  push:
    branches:
      - release

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  build-and-deploy:
    needs: test
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      docker_tags: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/tuuuur-api:latest
    secrets: inherit
