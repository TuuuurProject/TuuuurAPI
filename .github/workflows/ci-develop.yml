name: CI - Develop

on:
  push:
    branches:
      - develop

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  sonar:
    needs: test
    uses: ./.github/workflows/sonar.yml
    with:
      projectKey: TuuuurAPI
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}
      sonarHost: ${{ secrets.SONAR_HOST_URL }}
