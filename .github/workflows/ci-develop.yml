name: CI - Develop

on:
  push:
    branches:
      - develop

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  sonar:
    needs: test
    uses: ./.github/workflows/sonar.ymls
    with:
      projectKey: TuuuurAPI
      branchName: ${{ github.head_ref }}
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}
      sonarHost: ${{ secrets.SONAR_HOST_URL }}
      sonarOrganization: ${{ secrets.SONAR_ORGANIZATION_URL }}
