name: CI Template
on:
  workflow_call:
    inputs:
      project-key:
        required: true
        type: string
    secrets:
      sonar-token:
        required: true
      sonar-host:
        required: true

jobs:
  ci:
    name: Build + Tests + SonarQube
    runs-on: windows-latest
    steps:
      # ---------------------
      # Checkout
      # ---------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------
      # Setup JDK
      # ---------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # ---------------------
      # Setup .NET
      # ---------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.414'

      # ---------------------
      # Restore + Build + Test
      # ---------------------
      - name: Restore, Build and Test
        run: dotnet test Tuuuur.sln --configuration Release --verbosity normal

      # ---------------------
      # SonarQube Analysis
      # ---------------------
      - name: SonarQube PR Analysis
        shell: powershell
        run: |
          $prKey = "${{ github.event.pull_request.number }}"
          $prBranch = "${{ github.head_ref }}"
          $prBase = "${{ github.base_ref }}"

          # Installer le scanner si nécessaire
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

          if ($prKey) {
            Write-Host "Analyse PR $prKey"
            .\.sonar\scanner\dotnet-sonarscanner begin `
              /k:"${{ inputs.project-key }}" `
              /d:sonar.login="${{ secrets.sonar-token }}" `
              /d:sonar.host.url="${{ secrets.sonar-host }}" `
              /d:sonar.pullrequest.key=$prKey `
              /d:sonar.pullrequest.branch=$prBranch `
              /d:sonar.pullrequest.base=$prBase
          } else {
            Write-Host "Analyse sur develop"
            .\.sonar\scanner\dotnet-sonarscanner begin `
              /k:"${{ inputs.project-key }}" `
              /d:sonar.login="${{ secrets.sonar-token }}" `
              /d:sonar.host.url="${{ secrets.sonar-host }}"
          }

          dotnet test Tuuuur.sln --configuration Release --verbosity normal
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.login="${{ secrets.sonar-token }}"

      # ---------------------
      # Quality Gate Check
      # ---------------------
      - name: Check SonarQube Quality Gate
        shell: powershell
        run: |
          $projectKey = "${{ inputs.project-key }}"
          $sonarHost = "${{ secrets.sonar-host }}"
          $sonarToken = "${{ secrets.sonar-token }}"

          $analysisUrl = "$sonarHost/api/project_analyses/search?project=$projectKey"
          $analysis = Invoke-RestMethod -Uri $analysisUrl -Headers @{Authorization = "Basic " + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$sonarToken:"))}

          $lastAnalysisKey = $analysis.analyses[0].key
          $qgUrl = "$sonarHost/api/qualitygates/project_status?analysisId=$lastAnalysisKey"
          $qg = Invoke-RestMethod -Uri $qgUrl -Headers @{Authorization = "Basic " + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$sonarToken:"))}

          Write-Host "Quality Gate Status: $($qg.projectStatus.status)"

          if ($qg.projectStatus.status -ne "OK") {
              Write-Error "Quality Gate failed. PR blocked."
              exit 1
          }
