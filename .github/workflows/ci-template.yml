name: CI Template

on:
  workflow_call:
    inputs:
      project-key:
        required: true
        type: string
    secrets:
      sonar-token:
        required: true
      sonar-host:
        required: true

jobs:
  ci:
    name: Build + Tests + SonarQube
    runs-on: windows-latest
    steps:
      # ---------------------
      # Checkout
      # ---------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------
      # Setup JDK
      # ---------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # ---------------------
      # Setup .NET
      # ---------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.414'

      # ---------------------
      # Install Coverlet for coverage
      # ---------------------
      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console

      # ---------------------
      # Build + Test + Coverage
      # ---------------------
      - name: Build and Test with Coverage
        shell: powershell
        run: |
          # Build solution
          dotnet build Tuuuur.sln --configuration Release

          # Run tests and generate Cobertura coverage
          dotnet test Tuuuur.sln `
            --configuration Release `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=cobertura `
            /p:CoverletOutput=.\TestResults\coverage.cobertura.xml

          # Debug: check that coverage file exists
          Write-Host "Coverage files in TestResults:"
          dir .\TestResults\

      # ---------------------
      # SonarQube PR Analysis
      # ---------------------
      - name: SonarQube PR Analysis
        shell: powershell
        run: |
          $prKey = "${{ github.event.pull_request.number }}"
          $prBranch = "${{ github.head_ref }}"
          $prBase = "${{ github.base_ref }}"

          $projectKey = "${{ inputs.project-key }}"
          $sonarToken = "${{ secrets.sonar-token }}"
          $sonarHost = "${{ secrets.sonar-host }}"

          # Install scanner if needed
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

          # Build scanner arguments
          $scannerArgs = @(
            "/k:$projectKey"
            "/d:sonar.token=$sonarToken"
            "/d:sonar.host.url=$sonarHost"
            "/d:sonar.cs.opencover.reportsPaths=.\TestResults\coverage.cobertura.xml"
          )

          if ($prKey) {
            Write-Host "Analyzing PR $prKey"
            $scannerArgs += "/d:sonar.pullrequest.key=$prKey"
            $scannerArgs += "/d:sonar.pullrequest.branch=$prBranch"
            $scannerArgs += "/d:sonar.pullrequest.base=$prBase"
          }

          # Begin analysis
          .\.sonar\scanner\dotnet-sonarscanner begin $scannerArgs

          # Build solution (tests already run)
          dotnet build Tuuuur.sln --configuration Release

          # End analysis
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token=$sonarToken

      # ---------------------
      # Quality Gate Check
      # ---------------------
      - name: Check SonarQube Quality Gate
        shell: powershell
        run: |
          $projectKey = "${{ inputs.project-key }}"
          $sonarToken = "${{ secrets.sonar-token }}"
          $sonarHost = "${{ secrets.sonar-host }}"

          $headers = @{ Authorization = "Bearer $sonarToken" }

          Write-Host "Checking SonarQube Quality Gate for project: $projectKey"

          # Get latest analysis
          $analysisUrl = "$sonarHost/api/project_analyses/search?project=$projectKey"
          try {
              $analysis = Invoke-RestMethod -Uri $analysisUrl -Headers $headers
          } catch {
              Write-Error "Failed to fetch analyses. Possibly 401/403. Check token and permissions."
              exit 1
          }

          if (-not $analysis.analyses -or $analysis.analyses.Count -eq 0) {
              Write-Error "No analyses found for project $projectKey. Cannot check Quality Gate."
              exit 1
          }

          $lastAnalysisKey = $analysis.analyses[0].key
          Write-Host "Last analysis found, checking Quality Gate..."

          $qgUrl = "$sonarHost/api/qualitygates/project_status?analysisId=$lastAnalysisKey"
          try {
              $qg = Invoke-RestMethod -Uri $qgUrl -Headers $headers
          } catch {
              Write-Error "Failed to get Quality Gate. Possibly 401/403. Check token and permissions."
              exit 1
          }

          Write-Host "Quality Gate Status: $($qg.projectStatus.status)"
          if ($qg.projectStatus.status -ne "OK") {
              Write-Error "Quality Gate failed. PR blocked."
              exit 1
          }
