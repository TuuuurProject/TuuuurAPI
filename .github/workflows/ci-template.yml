name: CI + SonarQube Analysis

on:
  workflow_call:
    inputs:
      project-key:
        required: true
        type: string
    secrets:
      sonar-token:
        required: true
      sonar-host:
        required: true

jobs:
  ci:
    name: Build + Tests + SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.414'

      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console

      - name: Build, Test and Collect Coverage
        shell: powershell
        run: |
          $testProjects = @(
              "tests/Tuuuur.Domain.Tests/Tuuuur.Domain.Tests.csproj",
              "tests/Tuuuur.Core.Tests/Tuuuur.Core.Tests.csproj",
              "tests/Tuuuur.Infrastructure.Tests/Tuuuur.Infrastructure.Tests.csproj",
              "tests/Tuuuur.API.Tests/Tuuuur.API.Tests.csproj",
              "tests/Tuuuur.Factory.Tests/Tuuuur.Factory.Tests.csproj"
          )

          if (Test-Path ./TestResults) { Remove-Item -Recurse -Force ./TestResults }
          New-Item -ItemType Directory -Path ./TestResults

          dotnet build Tuuuur.sln --configuration Release

          foreach ($proj in $testProjects) {
              $projName = (Split-Path $proj -Leaf).Replace(".csproj","")
              dotnet test $proj `
                --configuration Release `
                /p:CollectCoverage=true `
                /p:CoverletOutputFormat=opencover `
                /p:CoverletOutput="./TestResults/$projName.opencover.xml"
          }

      - name: SonarQube Analysis
        shell: powershell
        run: |
          $projectKey = "${{ inputs.project-key }}"
          $sonarToken = "${{ secrets.sonar-token }}"
          $sonarHost = "${{ secrets.sonar-host }}"

          $prKey = "${{ github.event.pull_request.number }}"
          $prBranch = "${{ github.head_ref }}"
          $prBase = "${{ github.base_ref }}"

          # Install scanner locally
          $scannerPath = ".\.sonar\scanner"
          New-Item -Path $scannerPath -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path $scannerPath

          # Build scanner arguments
          $scannerArgs = @(
            "/k:$projectKey"
            "/d:sonar.host.url=$sonarHost"
            "/d:sonar.login=$sonarToken"
            "/d:sonar.cs.opencover.reportsPaths=.\TestResults\*.opencover.xml"
          )

          if ($prKey) {
            $scannerArgs += "/d:sonar.pullrequest.key=$prKey"
            $scannerArgs += "/d:sonar.pullrequest.branch=$prBranch"
            $scannerArgs += "/d:sonar.pullrequest.base=$prBase"
          }

          # Begin SonarQube analysis
          & "$scannerPath\dotnet-sonarscanner" begin $scannerArgs

          # Build solution (tests already run)
          dotnet build Tuuuur.sln --configuration Release

          # End SonarQube analysis
          & "$scannerPath\dotnet-sonarscanner" end /d:sonar.login=$sonarToken

      - name: Check SonarQube Quality Gate
        shell: powershell
        run: |
          $projectKey = "${{ inputs.project-key }}"
          $sonarToken = "${{ secrets.sonar-token }}"
          $sonarHost = "${{ secrets.sonar-host }}"
          $headers = @{ Authorization = "Bearer $sonarToken" }

          $analysisUrl = "$sonarHost/api/project_analyses/search?project=$projectKey"
          $analysis = Invoke-RestMethod -Uri $analysisUrl -Headers $headers
          if (-not $analysis.analyses -or $analysis.analyses.Count -eq 0) {
              Write-Error "No analyses found for project $projectKey."
              exit 1
          }

          $lastAnalysisKey = $analysis.analyses[0].key
          $qgUrl = "$sonarHost/api/qualitygates/project_status?analysisId=$lastAnalysisKey"
          $qg = Invoke-RestMethod -Uri $qgUrl -Headers $headers

          Write-Host "Quality Gate Status: $($qg.projectStatus.status)"
          if ($qg.projectStatus.status -ne "OK") {
              Write-Error "Quality Gate failed."
              exit 1
          }
