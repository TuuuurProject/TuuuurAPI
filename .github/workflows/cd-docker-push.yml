name: CD - Docker Push

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: "Environment name (e.g., preprod, production)"
      image_tag:
        required: true
        type: string
        description: "Docker image tag (e.g., preprod, latest)"
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SA_KEY:
        required: true
      GCP_REGION:
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  docker-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as credential helper
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image to GCP Artifact Registry (${{ inputs.environment_name }})
        uses: docker/build-push-action@v6
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          context: .
          file: ./src/Tuuuur.API/dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:${{ inputs.image_tag }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:${{ inputs.image_tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Database Docker image to GCP Artifact Registry (${{ inputs.environment_name }})
        uses: docker/build-push-action@v6
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          context: .
          file: ./src/Tuuuur.Database/dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/database:${{ inputs.image_tag }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/database:${{ inputs.image_tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
