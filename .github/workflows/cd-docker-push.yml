name: CD - Docker Push

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: "Environment name (e.g., preprod, production)"
      image_tag:
        required: true
        type: string
        description: "Docker image tag (e.g., preprod, latest)"
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SA_KEY:
        required: true
      GCP_REGION:
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  docker-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker to use gcloud as credential helper
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push API Docker image to GCP Artifact Registry (${{ inputs.environment_name }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          context: .
          file: ./src/Tuuuur.API/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:${{ inputs.image_tag }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/api:${{ inputs.image_tag }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ github.ref_name }}-api
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-api

      - name: Build and push Database Docker image to GCP Artifact Registry (${{ inputs.environment_name }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          context: .
          file: ./src/Tuuuur.Database/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/database:${{ inputs.image_tag }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tuuuur/database:${{ inputs.image_tag }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ github.ref_name }}-database
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-database

      - name: Save Git SHA to Secret Manager (API)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          ENV_TAG: ${{ inputs.image_tag }}
        run: |
          SECRET_NAME="tuuuur-api-${ENV_TAG}-git-sha"

          if gcloud secrets describe ${SECRET_NAME} --project=${GCP_PROJECT_ID} &>/dev/null; then
            # Met à jour le secret existant
            echo -n "${GIT_SHA}" | gcloud secrets versions add ${SECRET_NAME} --data-file=- --project=${GCP_PROJECT_ID}
            echo "✅ Secret ${SECRET_NAME} mis à jour avec le SHA: ${GIT_SHA}"
          else
            echo -n "${GIT_SHA}" | gcloud secrets create ${SECRET_NAME} --data-file=- --project=${GCP_PROJECT_ID}
            echo "✅ Secret ${SECRET_NAME} créé avec le SHA: ${GIT_SHA}"
          fi

      - name: Save Git SHA to Secret Manager (Database)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          ENV_TAG: ${{ inputs.image_tag }}
        run: |
          SECRET_NAME="tuuuur-database-${ENV_TAG}-git-sha"

          if gcloud secrets describe ${SECRET_NAME} --project=${GCP_PROJECT_ID} &>/dev/null; then
            # Met à jour le secret existant
            echo -n "${GIT_SHA}" | gcloud secrets versions add ${SECRET_NAME} --data-file=- --project=${GCP_PROJECT_ID}
            echo "✅ Secret ${SECRET_NAME} mis à jour avec le SHA: ${GIT_SHA}"
          else
            echo -n "${GIT_SHA}" | gcloud secrets create ${SECRET_NAME} --data-file=- --project=${GCP_PROJECT_ID}
            echo "✅ Secret ${SECRET_NAME} créé avec le SHA: ${GIT_SHA}"
          fi
