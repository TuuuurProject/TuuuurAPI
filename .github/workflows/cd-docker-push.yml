name: CD - Docker Push

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: "Environment name (e.g., preprod, production)"
      docker_tags:
        required: true
        type: string
        description: "Comma-separated Docker tags"
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SA_KEY:
        required: true
      GCP_REGION:
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  docker-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@f0990588f1e5b5af6827153b93673613abdc6ec7

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47bca50b64d9e2287e5063cc3a39112e14e7135

      - name: Build and push Docker image to GCP Artifact Registry (${{ inputs.environment_name }})
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355
        with:
          context: .
          file: ./src/Tuuuur.API/dockerfile
          push: true
          tags: ${{ inputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
