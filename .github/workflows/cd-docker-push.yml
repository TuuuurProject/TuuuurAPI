name: CD - Docker Push

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: "Environment name (e.g., preprod, production)"
      docker_tags:
        required: true
        type: string
        description: "Comma-separated Docker tags"
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      configuration: Release

  docker-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # Épinglé : actions/checkout@v4.1.7
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Docker Buildx
        # Épinglé : docker/setup-buildx-action@v3.3.0
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db

      - name: Login to Docker Hub
        # Épinglé : docker/login-action@v3.2.0
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (${{ inputs.environment_name }})
        # Épinglé : docker/build-push-action@v5.3.0
        uses: docker/build-push-action@4a13e500e55cf31b7a5d59a38ab2040ab0f42f56
        with:
          context: .
          file: ./src/Tuuuur.API/Dockerfile
          push: true
          tags: ${{ inputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
